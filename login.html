<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando ao Marketplace...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .loader-container {
            text-align: center;
        }

        /* Animação simples de carregamento (Spinner) */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #198754; /* Cor padrão do seu ecossistema verde */
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p {
            font-size: 16px;
            font-weight: 500;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <p>Autenticando e redirecionando para a vitrine...</p>
    </div>

    <script>
        // Executa o redirecionamento imediato assim que a página é interpretada
        window.location.href = 'index.html';
    </script>
</body>
</html>
