<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM</title>
    
    <link rel="stylesheet" href="css/admin.css">
    
    <script type="module" src="componentes/MenuTopo.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <menu-topo></menu-topo>

    <div class="box">
        <h2>➕ Adicionar Produto</h2>
        <div class="form-grid">
            <input type="text" id="nome" placeholder="Nome do produto">
            <input type="number" id="preco" placeholder="Preço">
            <input type="number" id="preco_antigo" placeholder="Preço antigo">
            <input type="text" id="desconto" placeholder="Desconto (Ex: 10)">
            <input type="text" id="imagem" placeholder="URL da imagem">
            
            <select id="categoria">
                <option value="index">Mais vendidos</option>
                <option value="hortifruti">Hortifruti</option>
                <option value="carnes">Carnes</option>
                <option value="limpeza">Limpeza</option>
                <option value="bebidas">Bebidas</option>
            </select>
        </div>
        <button class="btn" onclick="salvarProduto()">Salvar Produto</button>
    </div>

    <div class="box">
        <div class="box-cabecalho">
            <h2>📦 Produtos Cadastrados</h2>
            <span id="contador-produtos" class="badge-contador">0</span>
        </div>
        <div class="barra-busca-admin">
            <input type="search" id="busca-produto" placeholder="🔍 Buscar por nome ou categoria..." oninput="filtrarProdutosAdmin()">
            <select id="filtro-categoria-produto" onchange="filtrarProdutosAdmin()">
                <option value="">Todas as categorias</option>
                <option value="index">Mais vendidos</option>
                <option value="hortifruti">Hortifruti</option>
                <option value="carnes">Carnes</option>
                <option value="limpeza">Limpeza</option>
                <option value="bebidas">Bebidas</option>
            </select>
        </div>
        <div class="produtos-lista-admin" id="lista-produtos"></div>
    </div>

    <div class="box">
        <div class="box-cabecalho">
            <h2>🛒 Pedidos Recebidos</h2>
            <span id="contador-pedidos" class="badge-contador">0</span>
        </div>

        <div class="resumo-pedidos" id="resumo-pedidos"></div>

        <div class="barra-busca-admin barra-pedidos">
            <input type="search" id="busca-pedido" placeholder="🔍 Buscar cliente, telefone ou ID..." oninput="filtrarPedidosAdmin()">
            <select id="filtro-status-pedido" onchange="filtrarPedidosAdmin()">
                <option value="">Todos os status</option>
                <option value="Recebido">Recebido</option>
                <option value="Saiu para entrega">Saiu para entrega</option>
                <option value="Entregue">Entregue</option>
                <option value="Cancelado">Cancelado</option>
            </select>
        </div>

        <div id="lista-pedidos" class="lista-pedidos-admin"></div>
    </div>

    <script src="js/admin.js?v=6"></script>

</body>
</html>
