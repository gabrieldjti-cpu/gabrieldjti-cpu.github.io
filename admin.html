<!DOCTYPE html>
<html lang="pt-br">
<head>
<script>

if(localStorage.getItem("logado") !== "sim"){
window.location.href="login.html";
}

</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<style>

body{
font-family:Arial;
background:#f4f6fa;
padding:30px;
}

h1{
color:#198754;
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#198754;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

button:hover{
background:#146c43;
}

.produto{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-bottom:1px solid #eee;
}

.remover{
background:#dc3545;
}

.remover:hover{
background:#a71d2a;
}

</style>

<script>

let produtos=[];

/* CARREGAR PRODUTOS */

function carregarProdutos(){

let dados=localStorage.getItem("produtos");

if(dados){
produtos=JSON.parse(dados);
}

mostrarProdutos();

}

/* SALVAR */

function salvarProdutos(){

localStorage.setItem("produtos",JSON.stringify(produtos));

}

/* ADICIONAR */

function adicionarProduto(){

let nome=document.getElementById("nome").value;
let preco=document.getElementById("preco").value;

if(nome=="" || preco==""){
alert("Preencha os campos");
return;
}

produtos.push({
nome:nome,
preco:parseFloat(preco)
});

salvarProdutos();

mostrarProdutos();

document.getElementById("nome").value="";
document.getElementById("preco").value="";

}

/* MOSTRAR */

function mostrarProdutos(){

let lista=document.getElementById("lista");

lista.innerHTML="";

produtos.forEach((p,index)=>{

lista.innerHTML+=`

<div class="produto">

<span>${p.nome} - R$ ${p.preco.toFixed(2)}</span>

<button class="remover" onclick="removerProduto(${index})">Remover</button>

</div>

`;

});

}

/* REMOVER */

function removerProduto(index){

produtos.splice(index,1);

salvarProdutos();

mostrarProdutos();

}

window.onload=carregarProdutos;

</script>

</head>

<body>

<h1>⚙ Painel Administrativo</h1>

<div class="box">

<h3>Adicionar Produto</h3>

<input id="nome" placeholder="Nome do produto">

<input id="preco" type="number" step="0.01" placeholder="Preço">

<br>

<button onclick="adicionarProduto()">Adicionar Produto</button>

</div>

<div class="box">

<h3>Produtos cadastrados</h3>

<div id="lista"></div>

</div>

</body>
</html>
