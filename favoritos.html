<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="pagina-favoritos">

  <header class="topo">
    <div class="logo">❤️ Meus Favoritos</div>

    <div class="busca">
      <input type="text" id="busca" placeholder="Buscar nos favoritos..." onkeyup="filtrarProdutos()">
      <button type="button">🔍</button>
    </div>

    <div class="carrinho" onclick="irCarrinho()">
      🛍️ Carrinho (<span id="contador">0</span>)
    </div>
  </header>

  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="Hortifruti.html">Hortifruti</a>
    <a href="carnes.html">Carnes</a>
    <a href="limpeza.html">Limpeza</a>
    <a href="bebidas.html">Bebidas</a>
    <a href="favoritos.html" class="link-favoritos ativo">❤️ Favoritos <span id="contador-favoritos" class="contador-favoritos">0</span></a>
  </nav>

  <h1 class="titulo-pagina">Lista de compras rápida</h1>
  <p class="subtitulo-pagina">Produtos que você sempre compra — adicione ao carrinho com um toque.</p>

  <main class="produtos" id="lista-favoritos"></main>

  <div id="overlay" class="overlay" onclick="fecharCarrinho()"></div>

  <div id="carrinho-lateral" class="carrinho-lateral">
    <div style="display:flex; justify-content: space-between; align-items: center;">
      <h2>Meu Carrinho</h2>
      <button onclick="fecharCarrinho()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <hr>
    <div id="lista-carrinho" style="flex-grow: 1; overflow-y: auto; margin-top: 20px;"></div>
    <div id="total" style="font-weight: bold; font-size: 20px; margin: 20px 0;"></div>
    <button onclick="finalizarPedido()" style="width: 100%; padding: 15px; background: #198754; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
      Finalizar Pedido
    </button>
  </div>

  <div id="modal-pagamento" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:15px; text-align:center; max-width:400px; width:90%;">
      <h3 style="margin-top:0;">Como deseja pagar?</h3>
      <p>Escolha uma opção para finalizar no WhatsApp:</p>
      <button onclick="escolherPagamento('Cartão (Levar maquininha)')" style="width:100%; padding:12px; margin:10px 0; border:none; background:#007bff; color:white; border-radius:8px; font-weight:bold; cursor:pointer;">💳 Cartão</button>
      <button onclick="escolherPagamento('Pix')" style="width:100%; padding:12px; margin:10px 0; border:none; background:#000; color:white; border-radius:8px; font-weight:bold; cursor:pointer;">📱 Pix</button>
      <button onclick="escolherPagamento('Dinheiro')" style="width:100%; padding:12px; margin:10px 0; border:none; background:#28a745; color:white; border-radius:8px; font-weight:bold; cursor:pointer;">💵 Dinheiro</button>
      <button onclick="fecharModal()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px; font-weight:bold;">Cancelar</button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
