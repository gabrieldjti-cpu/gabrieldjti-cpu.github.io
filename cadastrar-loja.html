<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel da Loja</title>

<link rel="stylesheet" href="css/painel-loja.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-store"></i>

<h2>Painel da Loja</h2>

</div>

<nav>

<a href="painel-loja.html" class="ativo">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="produtos.html">

<i class="fa-solid fa-box"></i>

Produtos

</a>

<a href="pedidos.html">

<i class="fa-solid fa-cart-shopping"></i>

Pedidos

</a>

<a href="perfil.html">

<i class="fa-solid fa-user"></i>

Perfil

</a>

<button onclick="fazerLogout()">

<i class="fa-solid fa-right-from-bracket"></i>

Sair

</button>

</nav>

</header>

<main class="container">

<section class="card">

<h2>

<i class="fa-solid fa-shop"></i>

Minha Loja

</h2>

<div class="info-loja">

<p><strong>Nome:</strong> <span id="nome-loja">Carregando...</span></p>

<p><strong>Categoria:</strong> <span id="categoria-loja">...</span></p>

<p><strong>Cidade:</strong> <span id="cidade-loja">...</span></p>

<p><strong>Telefone:</strong> <span id="telefone-loja">...</span></p>

<p><strong>Status:</strong>

<span id="status-loja">🟢 Ativa</span>

</p>

</div>

<button class="btn">

<i class="fa-solid fa-pen"></i>

Editar Loja

</button>

</section>

<section class="card">

<h2>

<i class="fa-solid fa-bolt"></i>

Ações Rápidas

</h2>

<div class="atalhos">

<a href="produtos.html" class="atalho">

<i class="fa-solid fa-box"></i>

<span>Gerenciar Produtos</span>

</a>

<a href="novo-produto.html" class="atalho">

<i class="fa-solid fa-plus"></i>

<span>Novo Produto</span>

</a>

<a href="pedidos.html" class="atalho">

<i class="fa-solid fa-cart-shopping"></i>

<span>Pedidos</span>

</a>

<a href="configuracoes-loja.html" class="atalho">

<i class="fa-solid fa-gear"></i>

<span>Configurações</span>

</a>

</div>

</section>

<section class="card">

<h2>

<i class="fa-solid fa-chart-column"></i>

Estatísticas

</h2>

<div class="estatisticas">

<div class="box">

<h3 id="total-produtos">0</h3>

<p>Produtos</p>

</div>

<div class="box">

<h3 id="total-pedidos">0</h3>

<p>Pedidos</p>

</div>

<div class="box">

<h3 id="total-vendas">R$ 0,00</h3>

<p>Vendas</p>

</div>

</div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/painel-loja.js"></script>

</body>

</html>
