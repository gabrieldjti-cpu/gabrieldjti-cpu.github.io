<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Catálogo | Supermercado Jacinto</title>

<style>

body{
font-family:Poppins, sans-serif;
background:#f1f4f8;
padding:30px;
}

h1{
color:#198754;
margin-bottom:20px;
}

.categoria{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:15px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
font-size:16px;
margin-bottom:6px;
}

.card p{
font-weight:600;
}

button{
background:#198754;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#146c43;
}

.voltar{
margin-top:40px;
display:inline-block;
}

</style>

</head>

<body>

<h1>🛒 Catálogo Completo</h1>

<div id="catalogo"></div>

<a class="voltar" href="index.html">⬅ Voltar para o início</a>

<script>

const produtos = {

"Alimentos Básicos":[
["Arroz 1kg",6.50],
["Feijão 1kg",7.50],
["Macarrão 500g",3.80],
["Açúcar 1kg",4.20],
["Sal 1kg",2.20],
["Farinha de Trigo",5.40],
["Fubá",3.10],
["Milho de Pipoca",4.60],
["Lentilha 500g",6.90],
["Grão de Bico",7.20]
],

"Bebidas":[
["Coca-Cola 2L",9.50],
["Guaraná 2L",8.90],
["Suco de Laranja",5.80],
["Água Mineral",2.50],
["Água com Gás",3.00],
["Refrigerante Lata",4.50],
["Suco de Uva",6.70],
["Chá Gelado",4.80]
],

"Hortifruti":[
["Tomate 1kg",6.90],
["Batata 1kg",5.80],
["Cebola 1kg",4.20],
["Banana 1kg",4.50],
["Maçã 1kg",7.90],
["Alface",2.99],
["Cenoura 1kg",4.30],
["Repolho",5.00],
["Pepino",3.50]
],

"Padaria":[
["Pão Francês 1kg",12.00],
["Pão de Forma",7.50],
["Bolo Simples",9.90],
["Rosquinha",6.80],
["Pão de Queijo",10.50],
["Biscoito Amanteigado",5.60]
],

"Higiene":[
["Sabonete",2.50],
["Shampoo",12.90],
["Condicionador",13.50],
["Creme Dental",4.80],
["Escova de Dente",5.20],
["Desodorante",10.40],
["Papel Higiênico 4un",8.90]
],

"Limpeza":[
["Detergente",2.40],
["Sabão em Pó",9.80],
["Água Sanitária",4.30],
["Desinfetante",5.60],
["Esponja",2.00],
["Amaciante",8.70],
["Limpador Multiuso",6.50],
["Saco de Lixo",7.30]
]

};

function gerarCatalogo(){

const area=document.getElementById("catalogo");

for(let categoria in produtos){

let html=`<div class="categoria">
<h2>${categoria}</h2>
<div class="grid">`;

produtos[categoria].forEach(prod=>{

html+=`
<div class="card">
<h3>${prod[0]}</h3>
<p>R$ ${prod[1].toFixed(2)}</p>
<button onclick="adicionar('${prod[0]}',${prod[1]})">Adicionar</button>
</div>
`;

});

html+=`</div></div>`;

area.innerHTML+=html;

}

}

function adicionar(nome,preco){
alert(nome+" adicionado ao carrinho");
}

gerarCatalogo();

</script>

</body>
</html>
