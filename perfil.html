<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Perfil | Comércio da Cidade</title>

    <link rel="stylesheet" href="css/perfil.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="container">

            <a href="index.html" class="logo">

                <i class="fa-solid fa-store"></i>

                <span>Comércio da Cidade</span>

            </a>

            <nav>

                <a href="index.html">

                    <i class="fa-solid fa-house"></i>

                    Início

                </a>

            </nav>

        </div>

    </header>

    <!-- PERFIL -->

    <main class="perfil">

        <div class="container-perfil">

            <!-- CARD DO USUÁRIO -->

            <aside class="perfil-card">

                <div class="avatar">

                    <i class="fa-solid fa-user"></i>

                </div>

                <h2 id="perf-nome">Carregando...</h2>

                <p id="perf-email">email@email.com</p>

                <hr>

                <div class="info">

                    <p>

                        <i class="fa-solid fa-phone"></i>

                        <span id="perf-telefone">Não informado</span>

                    </p>

                    <p>

                        <i class="fa-solid fa-location-dot"></i>

                    </p>

                    <div id="perf-endereco-resumo" class="endereco">

                        Não informado

                    </div>

                </div>

                <button class="btn verde" onclick="abrirModalEditar()">

                    <i class="fa-solid fa-pen"></i>

                    Editar Perfil

                </button>

                <button class="btn vermelho" onclick="fazerLogout()">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Sair

                </button>

            </aside>

            <!-- CONTEÚDO -->

            <section class="conteudo">

                <!-- MINHA LOJA -->

                <div class="card">

                    <div class="titulo">

                        <h2>

                            <i class="fa-solid fa-shop"></i>

                            Minha Loja

                        </h2>

                    </div>

                    <div id="minha-loja">

                        <div class="sem-loja">

                            <i class="fa-solid fa-store-slash"></i>

                            <h3>Você ainda não possui uma loja.</h3>

                            <p>

                                Cadastre sua loja gratuitamente e comece a vender seus produtos.

                            </p>

                            <a href="cadastrar-loja.html" class="btn verde">

                                <i class="fa-solid fa-plus"></i>

                                Cadastrar Loja

                            </a>

                        </div>

                    </div>

                </div>

                <!-- HISTÓRICO -->

                <div class="card">

                    <div class="titulo">

                        <h2>

                            <i class="fa-solid fa-bag-shopping"></i>

                            Histórico de Compras

                        </h2>

                    </div>

                    <div id="historico-compras">

                        <div class="pedido">

                            <p>Carregando pedidos...</p>

                        </div>

                    </div>

                </div>

            </section>

        </div>

    </main>

    <!-- MODAL -->

    <div id="modal-editar-perfil" class="modal">

        <div class="modal-box">

            <div class="modal-topo">

                <h2>

                    <i class="fa-solid fa-user-pen"></i>

                    Editar Perfil

                </h2>

            </div>

            <div class="campo">

                <label>Nome</label>

                <input type="text" id="edit-nome">

            </div>

            <div class="campo">

                <label>Telefone</label>

                <input type="text" id="edit-telefone">

            </div>

            <div class="campo">

                <label>Rua</label>

                <input type="text" id="edit-rua">

            </div>

            <div class="linha">

                <div class="campo">

                    <label>Número</label>

                    <input type="text" id="edit-numero">

                </div>

                <div class="campo">

                    <label>Bairro</label>

                    <input type="text" id="edit-bairro">

                </div>

            </div>

            <div class="campo">

                <label>Cidade</label>

                <input type="text" id="edit-cidade">

            </div>

            <div class="botoes">

                <button class="btn cinza" onclick="fecharModalEditar()">

                    Cancelar

                </button>

                <button class="btn verde" onclick="salvarEdicaoPerfil()">

                    Salvar Alterações

                </button>

            </div>

        </div>

    </div>

    <!-- SUPABASE -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

    <script src="js/perfil.js"></script>

</body>

</html>
