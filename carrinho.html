<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="topo">
    <div class="logo">🛒 Seu Carrinho</div>
    <div class="carrinho" onclick="voltar()">⬅ Voltar</div>
  </header>

  <main>
    <div id="lista-carrinho"></div>
    <div id="total" class="total-carrinho">Total: R$ 0,00</div>

    <div style="max-width:700px; margin:20px auto; text-align:center;">
      <button onclick="finalizarPedido()" style="margin:10px;">Finalizar Pedido</button>
      <button onclick="limparCarrinho()" style="margin:10px;">Limpar Carrinho</button>
    </div>
  </main>

  <div id="modal-pagamento" class="modal">
    <div class="modal-box">
      <h2>Escolha a forma de pagamento</h2>
      <button onclick="escolherPagamento('Dinheiro')">💵 Dinheiro</button>
      <button onclick="escolherPagamento('Cartão')">💳 Cartão</button>
      <button onclick="escolherPagamento('PIX')">📱 PIX</button>
      <br><br>
      <button onclick="fecharModal()">Cancelar</button>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", carregarCarrinho);
  </script>
</body>
</html>
