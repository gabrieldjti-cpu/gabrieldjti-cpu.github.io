<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novo Produto | Comércio da Cidade</title>

<link rel="stylesheet" href="css/novo-produto.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-store"></i>

<h2>Painel da Loja</h2>

</div>

<nav>

<a href="painel-loja.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="produtos.html">

<i class="fa-solid fa-box"></i>

Produtos

</a>

<a href="perfil.html">

<i class="fa-solid fa-user"></i>

Perfil

</a>

<button onclick="fazerLogout()">

<i class="fa-solid fa-right-from-bracket"></i>

Sair

</button>

</nav>

</header>

<main class="container">

<div class="breadcrumb">

<a href="painel-loja.html">Dashboard</a>

>

<a href="produtos.html">Produtos</a>

>

<strong>Novo Produto</strong>

</div>

<div class="card">

<h1>

<i class="fa-solid fa-plus"></i>

Novo Produto

</h1>

<form id="form-produto">

<div class="grid">

<div class="col-esquerda">

<div class="campo">

<label>Nome do Produto</label>

<input
type="text"
id="nome"
required>

</div>

<div class="campo">

<label>Descrição</label>

<textarea
id="descricao"
rows="5"></textarea>

</div>

<div class="linha">

<div class="campo">

<label>Categoria</label>

<select id="categoria"></select>

</div>

<div class="campo">

<label>Preço</label>

<input
type="number"
step="0.01"
id="preco"
required>

</div>

</div>

<div class="linha">

<div class="campo">

<label>Preço Promocional</label>

<input
type="number"
step="0.01"
id="preco-promocao">

</div>

<div class="campo">

<label>Quantidade em Estoque</label>

<input
type="number"
id="estoque"
required>

</div>

</div>

<div class="campo">

<label>

<input
type="checkbox"
id="ativo"
checked>

Produto Ativo

</label>

</div>

<div class="campo">

<label>

<input
type="checkbox"
id="destaque">

Produto em Destaque

</label>

</div>

</div>

<div class="col-direita">

<div class="preview">

<img
id="preview"
src="img/sem-imagem.png"
alt="Prévia da imagem">

</div>

<div class="campo">

<label>Imagem do Produto</label>

<input
type="file"
id="imagem"
accept="image/*">

</div>

<div class="campo">

<label>Minha Loja</label>

<input
type="text"
id="nomeLoja"
disabled>

</div>

</div>

</div>

<div class="botoes">

<a
href="produtos.html"
class="btn-cancelar">

Cancelar

</a>

<button
type="submit"
class="btn-salvar">

<i class="fa-solid fa-floppy-disk"></i>

Salvar Produto

</button>

</div>

</form>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/novo-produto.js"></script>

</body>

</html>
